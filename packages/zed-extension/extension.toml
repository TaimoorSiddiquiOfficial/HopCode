id = "hopcode"
name = "HopCode"
version = "0.1.0"
schema_version = 1
authors = ["HopCode Team"]
description = "HopCode Agent Server Extension for Zed"
repository = "https://github.com/TaimoorSiddiquiOfficial/HopCode"

[agent_servers.hopcode]
name = "HopCode"
icon = "hopcode.svg"

[agent_servers.hopcode.targets.darwin-aarch64]
archive = "https://registry.npmjs.org/@hoptrendy/cli/-/cli-0.14.35.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.hopcode.targets.darwin-x86_64]
archive = "https://registry.npmjs.org/@hoptrendy/cli/-/cli-0.14.35.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.hopcode.targets.linux-x86_64]
archive = "https://registry.npmjs.org/@hoptrendy/cli/-/cli-0.14.35.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.hopcode.targets.windows-x86_64]
archive = "https://registry.npmjs.org/@hoptrendy/cli/-/cli-0.14.35.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

