id = "hopcode"
name = "HopCode"
version = "0.1.0"
schema_version = 1
authors = ["HopCode Team"]
description = "HopCode Agent Server Extension for Zed"
repository = "https://github.com/TaimoorSiddiquiOfficial/HopCode"

[agent_servers.hopcode]
name = "HopCode"
icon = "qwen-code.svg"

[agent_servers.qwen-code.targets.darwin-aarch64]
archive = "https://registry.npmjs.org/@qwen-code/qwen-code/-/qwen-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.qwen-code.targets.darwin-x86_64]
archive = "https://registry.npmjs.org/@qwen-code/qwen-code/-/qwen-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.qwen-code.targets.linux-x86_64]
archive = "https://registry.npmjs.org/@qwen-code/qwen-code/-/qwen-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.qwen-code.targets.windows-x86_64]
archive = "https://registry.npmjs.org/@qwen-code/qwen-code/-/qwen-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

