<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- HopCode Logo - Butterfly Simplified (Icon Version) -->
  <!-- Optimized for small sizes (favicon, app icon) -->
  
  <defs>
    <!-- Gradient for wings -->
    <linearGradient id="simpleWingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="simpleWingRightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Simplified Left Wing (reduced detail) -->
  <path d="M 75 100 
           Q 55 65 65 40 
           Q 75 20 100 30 
           L 100 100 Z" 
        fill="url(#simpleWingGradient)"/>
  
  <!-- Simplified Right Wing -->
  <path d="M 125 100 
           Q 145 65 135 40 
           Q 125 20 100 30 
           L 100 100 Z" 
        fill="url(#simpleWingRightGradient)"/>
  
  <!-- Simplified H (bold, no detail) -->
  <rect x="88" y="110" width="8" height="55" rx="2" fill="#F59E0B"/>
  <rect x="104" y="110" width="8" height="55" rx="2" fill="#F59E0B"/>
  <rect x="88" y="135" width="24" height="10" rx="2" fill="#F59E0B"/>
  
  <!-- Simplified center dot -->
  <circle cx="100" cy="90" r="8" fill="#FEF3C7"/>
</svg>
