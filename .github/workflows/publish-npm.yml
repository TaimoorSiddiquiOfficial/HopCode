name: 'Publish NPM Packages'

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated, or "all")'
        required: false
        type: string
        default: 'all'
      dry_run:
        description: 'Run dry-run (no actual publish)'
        required: false
        type: boolean
        default: true
      ref:
        description: 'Branch or ref to publish from'
        required: false
        type: string
        default: 'main'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  prepare:
    name: 'Prepare Packages'
    runs-on: 'ubuntu-latest'
    outputs:
      packages_json: '${{ steps.packages.outputs.packages_json }}'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'

      - name: 'Setup'
        uses: './.github/actions/npm-setup'

      - name: 'Determine packages to publish'
        id: 'packages'
        shell: bash
        run: |
          ROOT=$(pwd)
          ALL_PACKAGES=$(npm query '.workspace' | jq -c --arg root "${ROOT}/" \
            '[.[] | {name: .name, path: (.path | ltrimstr($root))}]')
          if [[ "${{ github.event.inputs.packages }}" == "all" ]]; then
            PACKAGES_JSON="${ALL_PACKAGES}"
          else
            INPUT_NAMES=$(echo "${{ github.event.inputs.packages }}" | tr ',' '\n' | jq -R . | jq -s .)
            PACKAGES_JSON=$(echo "${ALL_PACKAGES}" | \
              jq -c --argjson names "${INPUT_NAMES}" \
              '[.[] | select(.name as $n | ($names | index($n)) != null)]')
          fi
          echo "packages_json=${PACKAGES_JSON}" >> "$GITHUB_OUTPUT"
          echo "Packages to publish: ${PACKAGES_JSON}"

  publish-packages:
    name: 'Publish ${{ matrix.package.name }}'
    runs-on: 'ubuntu-latest'
    needs: 'prepare'
    strategy:
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages_json) }}
      fail-fast: false
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'

      - name: 'Setup'
        uses: './.github/actions/npm-setup'

      - name: 'Build Package'
        working-directory: '${{ matrix.package.path }}'
        shell: bash
        run: npm run build || true

      - name: 'Publish ${{ matrix.package.name }}'
        working-directory: '${{ matrix.package.path }}'
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "DRY RUN: Would publish ${{ matrix.package.name }}"
            npm publish --access public --dry-run
          else
            output=$(npm publish --access public --provenance 2>&1) && echo "$output" || {
              if echo "$output" | grep -q "You cannot publish over the previously published versions"; then
                version=$(node -p "require('./package.json').version")
                echo "⏭️ ${{ matrix.package.name }}@${version} already published, skipping"
              else
                echo "$output" >&2
                exit 1
              fi
            }
          fi
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'

  notify:
    name: 'Notify Result'
    runs-on: 'ubuntu-latest'
    needs: ['prepare', 'publish-packages']
    if: always()
    steps:
      - name: 'Publish Result'
        shell: bash
        run: |
          if [[ "${{ needs.publish-packages.result }}" == "success" ]]; then
            echo "✅ All packages published successfully!"
          elif [[ "${{ needs.publish-packages.result }}" == "skipped" ]]; then
            echo "⏭️ Publish skipped (dry run)"
          else
            echo "❌ Package publishing failed"
            exit 1
          fi
