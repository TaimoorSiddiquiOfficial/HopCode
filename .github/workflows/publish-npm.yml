name: 'Publish NPM Packages'

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated, or "all")'
        required: false
        type: 'string'
        default: 'all'
      dry_run:
        description: 'Run dry-run (no actual publish)'
        required: false
        type: 'boolean'
        default: true
      ref:
        description: 'Branch or ref to publish from'
        required: false
        type: 'string'
        default: 'main'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

permissions:
  id-token: 'write'
  contents: 'read'
  packages: 'write'

jobs:
  prepare:
    name: 'Prepare Packages'
    runs-on: 'ubuntu-latest'
    outputs:
      packages_json: '${{ steps.packages.outputs.packages_json }}'
      has_workspace_packages: '${{ steps.packages.outputs.has_workspace_packages }}'
      publish_root: '${{ steps.packages.outputs.publish_root }}'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'

      - name: 'Setup'
        uses: './.github/actions/npm-setup'

      - name: 'Determine packages to publish'
        id: 'packages'
        shell: 'bash'
        run: |
          ROOT=$(pwd)
          ROOT_PACKAGE='@hoptrendy/hopcode'
          PACKAGES_INPUT='${{ github.event.inputs.packages }}'
          ALL_PACKAGES=$(npm query '.workspace' | jq -c --arg root "${ROOT}/" \
            '[.[] | {name: .name, path: (.path | ltrimstr($root))}]')
          if [[ "$PACKAGES_INPUT" == "all" ]]; then
            PACKAGES_JSON="${ALL_PACKAGES}"
            PUBLISH_ROOT='true'
          else
            INPUT_NAMES=$(printf '%s' "$PACKAGES_INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R 'select(length > 0)' | jq -s .)
            PACKAGES_JSON=$(echo "${ALL_PACKAGES}" | \
              jq -c --argjson names "${INPUT_NAMES}" \
              '[.[] | select(.name as $n | ($names | index($n)) != null)]')
            if echo "${INPUT_NAMES}" | jq -e --arg root "${ROOT_PACKAGE}" 'index($root) != null' >/dev/null; then
              PUBLISH_ROOT='true'
            else
              PUBLISH_ROOT='false'
            fi
          fi
          if [[ "${PACKAGES_JSON}" == "[]" ]]; then
            HAS_WORKSPACE_PACKAGES='false'
          else
            HAS_WORKSPACE_PACKAGES='true'
          fi
          echo "packages_json=${PACKAGES_JSON}" >> "$GITHUB_OUTPUT"
          echo "has_workspace_packages=${HAS_WORKSPACE_PACKAGES}" >> "$GITHUB_OUTPUT"
          echo "publish_root=${PUBLISH_ROOT}" >> "$GITHUB_OUTPUT"
          echo "Packages to publish: ${PACKAGES_JSON}"
          echo "Publish root package: ${PUBLISH_ROOT}"

  publish-packages:
    name: 'Publish ${{ matrix.package.name }}'
    runs-on: 'ubuntu-latest'
    needs: 'prepare'
    if: "${{ needs.prepare.outputs.has_workspace_packages == 'true' }}"
    strategy:
      matrix:
        package: '${{ fromJson(needs.prepare.outputs.packages_json) }}'
      fail-fast: false
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'

      - name: 'Setup'
        uses: './.github/actions/npm-setup'

      - name: 'Generate build artifacts'
        shell: 'bash'
        run: 'node scripts/generate-git-commit-info.js'

      - name: 'Build workspace dependencies'
        shell: 'bash'
        run: 'npm run build'

      - name: 'Build Package'
        working-directory: '${{ matrix.package.path }}'
        shell: 'bash'
        run: 'npm run build'

      - name: 'Normalize workspace deps for publish'
        working-directory: '${{ matrix.package.path }}'
        shell: 'bash'
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          let changed = false;
          for (const section of ['dependencies','devDependencies','peerDependencies','optionalDependencies']) {
            if (!pkg[section]) continue;
            for (const [dep, ver] of Object.entries(pkg[section])) {
              if (!ver.startsWith('file:')) continue;
              const relPath = ver.slice(5);
              try {
                const depPkg = JSON.parse(fs.readFileSync(path.resolve(relPath, 'package.json'), 'utf8'));
                const actualName = depPkg.name;
                const resolvedVer = depPkg.version;
                if (actualName !== dep) {
                  pkg[section][actualName] = resolvedVer;
                  delete pkg[section][dep];
                  console.log('Renamed+resolved: ' + dep + ' -> ' + actualName + '@' + resolvedVer);
                } else {
                  pkg[section][dep] = resolvedVer;
                  console.log('Resolved: ' + dep + '@' + resolvedVer);
                }
                changed = true;
              } catch(e) {
                console.warn('Could not resolve ' + dep + ' from ' + ver + ': ' + e.message);
              }
            }
          }
          if (changed) {
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated package.json');
          } else {
            console.log('No file: deps to normalize');
          }
          "

      - name: 'Publish ${{ matrix.package.name }}'
        working-directory: '${{ matrix.package.path }}'
        shell: 'bash'
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "DRY RUN: Would publish ${{ matrix.package.name }}"
            npm publish --access public --dry-run
          else
            if output=$(npm publish --access public --provenance 2>&1); then
              echo "$output"
            else
              if echo "$output" | grep -q "You cannot publish over the previously published versions"; then
                version=$(node -p "require('./package.json').version")
                echo "⏭️ ${{ matrix.package.name }}@${version} already published, skipping"
              else
                echo "$output" >&2
                exit 1
              fi
            fi
          fi
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'

  publish-root-package:
    name: 'Publish root CLI package'
    runs-on: 'ubuntu-latest'
    needs: 'prepare'
    if: "${{ needs.prepare.outputs.publish_root == 'true' }}"
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'

      - name: 'Setup'
        uses: './.github/actions/npm-setup'

      - name: 'Build root CLI package'
        run: 'npm run build && npm run bundle && npm run prepare:package'

      - name: 'Publish root CLI package'
        working-directory: 'dist'
        shell: 'bash'
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            npm publish --access public --dry-run
          else
            if output=$(npm publish --access public --provenance 2>&1); then
              echo "$output"
            else
              if echo "$output" | grep -q "You cannot publish over the previously published versions"; then
                version=$(node -p "require('./package.json').version")
                echo "⏭️ @hoptrendy/hopcode@${version} already published, skipping"
              else
                echo "$output" >&2
                exit 1
              fi
            fi
          fi
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'

  publish-vscode-extension:
    name: 'Publish VS Code Extension (Marketplace + Open VSX)'
    runs-on: 'ubuntu-latest'
    needs: ['prepare', 'publish-root-package']
    if: >-
      !cancelled() &&
      needs.prepare.result == 'success' &&
      needs.publish-root-package.result != 'failure' &&
      (github.event.inputs.packages == 'all' ||
       contains(github.event.inputs.packages, 'vscode-ide-companion'))
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'

      - name: 'Setup'
        uses: './.github/actions/npm-setup'

      - name: 'Generate git commit info'
        shell: 'bash'
        run: 'node scripts/generate-git-commit-info.js'

      - name: 'Build all packages'
        shell: 'bash'
        run: 'npm run build'

      - name: 'Package VS Code Extension (VSIX)'
        working-directory: 'packages/vscode-ide-companion'
        shell: 'bash'
        run: 'npm run package'

      - name: 'Publish to VS Code Marketplace'
        if: "${{ github.event.inputs.dry_run != 'true' }}"
        working-directory: 'packages/vscode-ide-companion'
        shell: 'bash'
        run: |
          if output=$(npx @vscode/vsce publish --packagePath ./*.vsix 2>&1); then
            echo "$output"
            echo "✅ VS Code Marketplace: published successfully"
          else
            echo "$output"
            if echo "$output" | grep -qiE "(already published|already exists|version already|EEXIST|already.*0\.[0-9])"; then
              version=$(node -p "require('./package.json').version")
              echo "⏭️ VS Code Marketplace: v${version} already published, skipping"
            else
              echo "$output" >&2; exit 1
            fi
          fi
        env:
          VSCE_PAT: '${{ secrets.VSCE_PAT }}'

      - name: 'Publish to Open VSX Registry'
        if: "${{ github.event.inputs.dry_run != 'true' }}"
        working-directory: 'packages/vscode-ide-companion'
        shell: 'bash'
        run: |
          if output=$(npx ovsx publish ./*.vsix -p "$OVSX_TOKEN" 2>&1); then
            echo "$output"
          else
            if echo "$output" | grep -q "Published "; then
              echo "✅ Open VSX: published successfully (exit code ignored)"
            elif echo "$output" | grep -qiE "(already published|already exists|version already)"; then
              version=$(node -p "require('./package.json').version")
              echo "⏭️ Open VSX: v${version} already published, skipping"
            elif echo "$output" | grep -qiE "(unknown publisher|create-namespace|namespace)"; then
              echo "⚠️ Open VSX: publisher namespace not registered. Visit https://open-vsx.org to create the 'hopcode' namespace, then re-run."
            elif echo "$output" | grep -qiE "(publisher agreement|eclipse foundation|sign.*agreement)"; then
              echo "⚠️ Open VSX: Publisher Agreement not signed. Visit https://open-vsx.org to sign the Eclipse Foundation Publisher Agreement."
            else
              echo "$output" >&2; exit 1
            fi
          fi
        env:
          OVSX_TOKEN: '${{ secrets.OVSX_TOKEN }}'

      - name: 'DRY RUN: Show packaged VSIX'
        if: "${{ github.event.inputs.dry_run == 'true' }}"
        working-directory: 'packages/vscode-ide-companion'
        shell: 'bash'
        run: |
          ls -lh ./*.vsix || echo "No VSIX found"
          echo "DRY RUN: Extension packaged but not published"

  notify:
    name: 'Notify Result'
    runs-on: 'ubuntu-latest'
    needs:
      [
        'prepare',
        'publish-packages',
        'publish-root-package',
        'publish-vscode-extension',
      ]
    if: 'always()'
    steps:
      - name: 'Publish Result'
        shell: 'bash'
        run: |
          npm_result="${{ needs.publish-packages.result }}"
          root_result="${{ needs.publish-root-package.result }}"
          vsix_result="${{ needs.publish-vscode-extension.result }}"
          failed=0

          if [[ "$npm_result" == "failure" ]]; then
            echo "❌ NPM package publishing failed"; failed=1
          elif [[ "$npm_result" == "success" ]]; then
            echo "✅ NPM packages published successfully"
          else
            echo "⏭️ NPM publish: ${npm_result}"
          fi

          if [[ "$root_result" == "failure" ]]; then
            echo "❌ Root package publishing failed"; failed=1
          elif [[ "$root_result" == "success" ]]; then
            echo "✅ Root package published successfully"
          else
            echo "⏭️ Root package publish: ${root_result}"
          fi

          if [[ "$vsix_result" == "failure" ]]; then
            echo "❌ VS Code Extension publishing failed"; failed=1
          elif [[ "$vsix_result" == "success" ]]; then
            echo "✅ VS Code Extension published successfully"
          else
            echo "⏭️ VS Code Extension: ${vsix_result}"
          fi

          exit $failed
