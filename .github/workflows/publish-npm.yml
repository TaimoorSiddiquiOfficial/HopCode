name: 'Publish NPM Packages'

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated, or "all")'
        required: false
        type: string
        default: 'all'
      dry_run:
        description: 'Run dry-run (no actual publish)'
        required: false
        type: boolean
        default: true
      ref:
        description: 'Branch or ref to publish from'
        required: false
        type: string
        default: 'main'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  prepare:
    name: 'Prepare Packages'
    runs-on: 'ubuntu-latest'
    outputs:
      packages: '${{ steps.packages.outputs.PACKAGES }}'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@hopcode'

      - name: 'Install Dependencies'
        run: npm ci --no-audit --progress=false

      - name: 'Determine packages to publish'
        id: 'packages'
        run: |
          if [[ "${{ github.event.inputs.packages }}" == "all" ]]; then
            # Get all workspace packages
            PACKAGES=$(npm query '.workspace' | jq -r '.[].name' | tr '\n' ',' | sed 's/,$//')
          else
            PACKAGES="${{ github.event.inputs.packages }}"
          fi
          echo "PACKAGES=${PACKAGES}" >> "$GITHUB_OUTPUT"
          echo "Packages to publish: ${PACKAGES}"

  publish-packages:
    name: 'Publish Package'
    runs-on: 'ubuntu-latest'
    needs: 'prepare'
    strategy:
      matrix:
        package: ${{ fromJson(format('["{0}"]', join(needs.prepare.outputs.packages, '","'))) }}
      fail-fast: false
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@hopcode'

      - name: 'Install Dependencies'
        run: npm ci --no-audit --progress=false

      - name: 'Build Package'
        working-directory: '${{ matrix.package }}'
        run: npm run build || true

      - name: 'Publish ${{ matrix.package }}'
        working-directory: '${{ matrix.package }}'
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "DRY RUN: Would publish ${{ matrix.package }}"
            npm publish --access public --dry-run
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'

  notify:
    name: 'Notify Result'
    runs-on: 'ubuntu-latest'
    needs: ['prepare', 'publish-packages']
    if: always()
    steps:
      - name: 'Publish Result'
        shell: bash
        run: |
          if [[ "${{ needs.publish-packages.result }}" == "success" ]]; then
            echo "✅ All packages published successfully!"
          elif [[ "${{ needs.publish-packages.result }}" == "skipped" ]]; then
            echo "⏭️ Publish skipped (dry run)"
          else
            echo "❌ Package publishing failed"
            exit 1
          fi
