name: 'Build and Publish Docker Image'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image version/tag (e.g., 0.9.1, 0.9.2-rc.1)'
        type: 'string'
        required: false
      publish:
        description: 'Publish to GHCR'
        type: 'boolean'
        default: false

env:
  REGISTRY: 'ghcr.io'

jobs:
  build-and-push-to-ghcr:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      packages: 'write'

    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd'  # v6.0.2
        with:
          ref: '${{ github.ref }}'

      - name: 'Process version'
        id: 'version'
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          # For tag pushes, extract version from the tag
          if [[ -z "$INPUT_VERSION" && "${{ github.ref_type }}" == "tag" ]]; then
            INPUT_VERSION="${{ github.ref_name }}"
          fi

          # Strip 'v' prefix if present
          CLEAN_VERSION="${INPUT_VERSION#v}"

          # Extract major.minor for floating tag (e.g., 1.0.0 -> 1.0)
          MAJOR_MINOR=$(echo "$CLEAN_VERSION" | grep -oE '^[0-9]+\.[0-9]+' || true)

          echo "raw=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "clean=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "Input version: ${INPUT_VERSION}"
          echo "Clean version: ${CLEAN_VERSION}"
          echo "Major.minor: ${MAJOR_MINOR}"

      - name: 'Read sandbox image config'
        id: 'image'
        shell: 'bash'
        run: |
          ROOT_IMAGE=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log(pkg.config?.sandboxImageUri || '');")
          CLI_IMAGE=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8')); console.log(pkg.config?.sandboxImageUri || '');")

          if [[ -z "$ROOT_IMAGE" ]]; then
            echo "Error: package.json config.sandboxImageUri is missing"
            exit 1
          fi

          if [[ "$CLI_IMAGE" != "$ROOT_IMAGE" ]]; then
            echo "Error: sandbox image mismatch"
            echo "Root: $ROOT_IMAGE"
            echo "CLI:  $CLI_IMAGE"
            exit 1
          fi

          IMAGE_REPOSITORY="${ROOT_IMAGE%:*}"
          PACKAGE_IMAGE_TAG="${ROOT_IMAGE##*:}"

          if [[ "$IMAGE_REPOSITORY" == "$PACKAGE_IMAGE_TAG" || -z "$PACKAGE_IMAGE_TAG" ]]; then
            echo "Error: sandboxImageUri must include an explicit tag"
            exit 1
          fi

          if [[ "$IMAGE_REPOSITORY" != ghcr.io/* ]]; then
            echo "Error: sandboxImageUri must use ghcr.io"
            echo "Actual: $ROOT_IMAGE"
            exit 1
          fi

          IMAGE_TAG="${{ steps.version.outputs.clean }}"
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="$PACKAGE_IMAGE_TAG"
          fi

          MAJOR_MINOR=$(echo "$IMAGE_TAG" | grep -oE '^[0-9]+\.[0-9]+' || true)

          echo "repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "Sandbox image repository: ${IMAGE_REPOSITORY}"
          echo "Sandbox image tag: ${IMAGE_TAG}"

      - name: 'Debug inputs'
        if: |-
          ${{ runner.debug == '1' }}
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Version input (raw): ${{ steps.version.outputs.raw }}"
          echo "Image repository: ${{ steps.image.outputs.repository }}"
          echo "Image tag: ${{ steps.image.outputs.tag }}"
          echo "Major.minor: ${{ steps.image.outputs.major_minor }}"
          echo "Publish input: ${{ github.event.inputs.publish }}"
          echo "GitHub ref: ${{ github.ref }}"

      - name: 'Set up QEMU'
        uses: 'docker/setup-qemu-action@v4' # ratchet:exclude

      - name: 'Set up Docker Buildx'
        uses: 'docker/setup-buildx-action@v4' # ratchet:exclude

      - name: 'Extract metadata (tags, labels) for Docker'
        id: 'meta'
        uses: 'docker/metadata-action@v6' # ratchet:exclude
        with:
          images: '${{ steps.image.outputs.repository }}'
          tags: |
            type=raw,value=${{ steps.image.outputs.tag }},enable=${{ steps.image.outputs.tag != '' }}
            type=raw,value=${{ steps.image.outputs.major_minor }},enable=${{ steps.image.outputs.major_minor != '' }}
            type=sha,prefix=sha-,format=short

      - name: 'Log in to the Container registry'
        if: |-
          ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
        uses: 'docker/login-action@v4' # ratchet:exclude
        with:
          registry: '${{ env.REGISTRY }}'
          username: '${{ github.actor }}'
          password: '${{ secrets.GITHUB_TOKEN }}'

      - name: 'Build and push Docker image'
        id: 'build-and-push'
        uses: 'docker/build-push-action@v7' # ratchet:exclude
        with:
          context: '.'
          platforms: 'linux/amd64,linux/arm64'
          push: |-
            ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
          tags: '${{ steps.meta.outputs.tags }}'
          labels: '${{ steps.meta.outputs.labels }}'
          build-args: |
            CLI_VERSION_ARG=${{ steps.image.outputs.tag || github.sha }}
