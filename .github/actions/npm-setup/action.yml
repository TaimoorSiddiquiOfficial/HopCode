name: 'NPM Setup'
description: >
  Setup Node.js 24 and run npm ci.
  NOTE: actions/checkout must be called before using this action
  (local actions require the repo to already be on disk).

inputs:
  registry-url:
    description: 'NPM registry URL'
    required: false
    default: 'https://registry.npmjs.org'
  scope:
    description: 'NPM scope for the registry'
    required: false
    default: '@hoptrendy'

runs:
  using: 'composite'
  steps:
    - name: 'Setup Node.js'
      uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4.4.0
      with:
        node-version: '24'
        registry-url: '${{ inputs.registry-url }}'
        scope: '${{ inputs.scope }}'

    - name: 'Install Dependencies'
      shell: 'bash'
      run: 'npm ci --no-audit --progress=false'
