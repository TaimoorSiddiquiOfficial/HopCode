<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- HopCode Logo - Icon Grid / Sprite Sheet -->
  <!-- Shows logo at various standard sizes -->
  
  <defs>
    <linearGradient id="gridWingLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gridWingRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#1E1E2E"/>
  
  <!-- Title -->
  <text x="150" y="25" font-family="system-ui" font-size="14" fill="#E4E4E7" text-anchor="middle" font-weight="600">HopCode Icon Grid</text>
  
  <!-- 16x16 (Favicon size) - Top Left -->
  <rect x="10" y="40" width="16" height="16" fill="#0F0F14" rx="2"/>
  <g transform="translate(10, 40) scale(0.08)">
    <path d="M 75 100 Q 55 70 60 50 Q 65 30 85 25 Q 95 23 100 30 L 100 100 Q 85 100 75 100 Z" fill="url(#gridWingLeft)"/>
    <path d="M 125 100 Q 145 70 140 50 Q 135 30 115 25 Q 105 23 100 30 L 100 100 Q 115 100 125 100 Z" fill="url(#gridWingRight)"/>
    <rect x="88" y="110" width="8" height="20" fill="#F59E0B"/>
    <rect x="104" y="110" width="8" height="20" fill="#F59E0B"/>
    <rect x="88" y="125" width="24" height="8" fill="#F59E0B"/>
    <circle cx="100" cy="95" r="4" fill="#FEF3C7"/>
  </g>
  <text x="18" y="70" font-family="system-ui" font-size="8" fill="#A1A1AA" text-anchor="middle">16×16</text>
  
  <!-- 32x32 (Small icon) -->
  <rect x="50" y="40" width="32" height="32" fill="#0F0F14" rx="4"/>
  <g transform="translate(50, 40) scale(0.16)">
    <path d="M 75 100 Q 55 70 60 50 Q 65 30 85 25 Q 95 23 100 30 L 100 100 Q 85 100 75 100 Z" fill="url(#gridWingLeft)"/>
    <path d="M 125 100 Q 145 70 140 50 Q 135 30 115 25 Q 105 23 100 30 L 100 100 Q 115 100 125 100 Z" fill="url(#gridWingRight)"/>
    <rect x="88" y="110" width="8" height="20" fill="#F59E0B"/>
    <rect x="104" y="110" width="8" height="20" fill="#F59E0B"/>
    <rect x="88" y="125" width="24" height="8" fill="#F59E0B"/>
    <circle cx="100" cy="95" r="4" fill="#FEF3C7"/>
  </g>
  <text x="66" y="85" font-family="system-ui" font-size="9" fill="#A1A1AA" text-anchor="middle">32×32</text>
  
  <!-- 64x64 (Medium icon) -->
  <rect x="105" y="40" width="64" height="64" fill="#0F0F14" rx="6"/>
  <g transform="translate(105, 40) scale(0.32)">
    <path d="M 75 100 Q 55 70 60 50 Q 65 30 85 25 Q 95 23 100 30 L 100 100 Q 85 100 75 100 Z" fill="url(#gridWingLeft)"/>
    <path d="M 125 100 Q 145 70 140 50 Q 135 30 115 25 Q 105 23 100 30 L 100 100 Q 115 100 125 100 Z" fill="url(#gridWingRight)"/>
    <rect x="88" y="110" width="8" height="20" fill="#F59E0B"/>
    <rect x="104" y="110" width="8" height="20" fill="#F59E0B"/>
    <rect x="88" y="125" width="24" height="8" fill="#F59E0B"/>
    <circle cx="100" cy="95" r="4" fill="#FEF3C7"/>
  </g>
  <text x="137" y="117" font-family="system-ui" font-size="10" fill="#A1A1AA" text-anchor="middle">64×64</text>
  
  <!-- 128x128 (Large icon) -->
  <rect x="10" y="120" width="128" height="128" fill="#0F0F14" rx="12"/>
  <g transform="translate(10, 120) scale(0.64)">
    <path d="M 75 100 Q 55 70 60 50 Q 65 30 85 25 Q 95 23 100 30 L 100 100 Q 85 100 75 100 Z" fill="url(#gridWingLeft)"/>
    <path d="M 125 100 Q 145 70 140 50 Q 135 30 115 25 Q 105 23 100 30 L 100 100 Q 115 100 125 100 Z" fill="url(#gridWingRight)"/>
    <rect x="88" y="110" width="8" height="20" fill="#F59E0B"/>
    <rect x="104" y="110" width="8" height="20" fill="#F59E0B"/>
    <rect x="88" y="125" width="24" height="8" fill="#F59E0B"/>
    <circle cx="100" cy="95" r="4" fill="#FEF3C7"/>
  </g>
  <text x="74" y="262" font-family="system-ui" font-size="11" fill="#A1A1AA" text-anchor="middle">128×128</text>
  
  <!-- 256x256 (XL icon) - Right side -->
  <rect x="160" y="120" width="128" height="128" fill="#0F0F14" rx="12" opacity="0.3"/>
  <text x="224" y="190" font-family="system-ui" font-size="12" fill="#A1A1AA" text-anchor="middle">256×256</text>
  <text x="224" y="210" font-family="system-ui" font-size="10" fill="#71717A" text-anchor="middle">(separate file)</text>
  
  <!-- Usage guide -->
  <text x="150" y="285" font-family="system-ui" font-size="9" fill="#52525B" text-anchor="middle">Favicon · App Icons · Extensions · Marketing</text>
</svg>
