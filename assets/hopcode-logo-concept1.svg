<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- HopCode Logo - Concept 1: Butterfly Abstraction -->
  <!-- Represents: Transformation, Code, AI Intelligence -->
  
  <defs>
    <!-- Gradient for left wing (purple to violet) -->
    <linearGradient id="wingLeftGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for right wing (cyan to blue) -->
    <linearGradient id="wingRightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle (optional, for icon version) -->
  <circle cx="100" cy="100" r="95" fill="#0F0F14"/>
  
  <!-- Left Wing (stylized code bracket shape) -->
  <path d="M 75 100 
           Q 55 70 60 50 
           Q 65 30 85 25 
           Q 95 23 100 30 
           L 100 100 
           Q 85 100 75 100 Z" 
        fill="url(#wingLeftGradient)"
        filter="url(#glow)"/>
  
  <!-- Right Wing (mirror of left) -->
  <path d="M 125 100 
           Q 145 70 140 50 
           Q 135 30 115 25 
           Q 105 23 100 30 
           L 100 100 
           Q 115 100 125 100 Z" 
        fill="url(#wingRightGradient)"
        filter="url(#glow)"/>
  
  <!-- Center H Letterform -->
  <path d="M 88 115 
           L 88 165 
           L 96 165 
           L 96 140 
           L 104 140 
           L 104 165 
           L 112 165 
           L 112 115 
           L 104 115 
           L 104 132 
           L 96 132 
           L 96 115 
           Z" 
        fill="#F59E0B"
        filter="url(#glow)"/>
  
  <!-- Code bracket accent (left) -->
  <path d="M 70 85 
           L 62 100 
           L 70 115" 
        stroke="#FEF3C7" 
        stroke-width="4" 
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.8"/>
  
  <!-- Code bracket accent (right) -->
  <path d="M 130 85 
           L 138 100 
           L 130 115" 
        stroke="#FEF3C7" 
        stroke-width="4" 
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.8"/>
  
  <!-- Center dot (AI core) -->
  <circle cx="100" cy="95" r="6" fill="#FEF3C7" filter="url(#glow)"/>
</svg>
