<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- HopCode Logo - Butterfly Abstraction - Monochrome (White) -->
  <!-- For use on dark backgrounds -->
  
  <defs>
    <!-- Glow effect -->
    <filter id="monoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Left Wing -->
  <path d="M 75 100 
           Q 55 70 60 50 
           Q 65 30 85 25 
           Q 95 23 100 30 
           L 100 100 
           Q 85 100 75 100 Z" 
        fill="#FFFFFF"
        filter="url(#monoGlow)"
        opacity="0.9"/>
  
  <!-- Right Wing -->
  <path d="M 125 100 
           Q 145 70 140 50 
           Q 135 30 115 25 
           Q 105 23 100 30 
           L 100 100 
           Q 115 100 125 100 Z" 
        fill="#FFFFFF"
        filter="url(#monoGlow)"
        opacity="0.9"/>
  
  <!-- Center H Letterform -->
  <path d="M 88 115 
           L 88 165 
           L 96 165 
           L 96 140 
           L 104 140 
           L 104 165 
           L 112 165 
           L 112 115 
           L 104 115 
           L 104 132 
           L 96 132 
           L 96 115 
           Z" 
        fill="#FFFFFF"
        filter="url(#monoGlow)"/>
  
  <!-- Code bracket accent (left) -->
  <path d="M 70 85 
           L 62 100 
           L 70 115" 
        stroke="#FFFFFF" 
        stroke-width="4" 
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.7"/>
  
  <!-- Code bracket accent (right) -->
  <path d="M 130 85 
           L 138 100 
           L 130 115" 
        stroke="#FFFFFF" 
        stroke-width="4" 
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.7"/>
  
  <!-- Center dot (AI core) -->
  <circle cx="100" cy="95" r="6" fill="#FFFFFF" filter="url(#monoGlow)"/>
</svg>
