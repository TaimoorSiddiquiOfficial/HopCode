<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- HopCode Logo - Concept 3: Code Circuit -->
  <!-- Represents: Technology, AI Neural Networks, Connectivity -->
  
  <defs>
    <!-- Gradient for circuit lines -->
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Node glow -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Hexagon pattern clip -->
    <clipPath id="hexClip">
      <polygon points="100,20 145,45 145,95 100,120 55,95 55,45"/>
    </clipPath>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0F172A"/>
  
  <!-- Hexagonal outer boundary (subtle) -->
  <polygon points="100,25 140,47.5 140,92.5 100,115 60,92.5 60,47.5" 
           stroke="#1E293B" 
           stroke-width="2" 
           fill="none"
           opacity="0.5"/>
  
  <!-- Circuit lines forming H shape -->
  <!-- Left vertical circuit -->
  <path d="M 75 50 L 75 70 M 75 80 L 75 100 M 75 110 L 75 150" 
        stroke="url(#circuitGradient)" 
        stroke-width="4" 
        stroke-linecap="round"
        fill="none"/>
  
  <!-- Right vertical circuit -->
  <path d="M 125 50 L 125 70 M 125 80 L 125 100 M 125 110 L 125 150" 
        stroke="url(#circuitGradient)" 
        stroke-width="4" 
        stroke-linecap="round"
        fill="none"/>
  
  <!-- Horizontal circuit (connecting bar) -->
  <path d="M 75 95 L 90 95 M 100 95 L 110 95 M 115 95 L 125 95" 
        stroke="url(#circuitGradient)" 
        stroke-width="4" 
        stroke-linecap="round"
        fill="none"/>
  
  <!-- Diagonal circuit connections (neural network) -->
  <path d="M 75 70 L 90 85" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 125 70 L 110 85" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 75 110 L 90 125" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 125 110 L 110 125" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Node points (glowing) -->
  <circle cx="75" cy="50" r="5" fill="#0EA5E9" filter="url(#nodeGlow)"/>
  <circle cx="75" cy="100" r="5" fill="#8B5CF6" filter="url(#nodeGlow)"/>
  <circle cx="75" cy="150" r="5" fill="#14B8A6" filter="url(#nodeGlow)"/>
  
  <circle cx="125" cy="50" r="5" fill="#0EA5E9" filter="url(#nodeGlow)"/>
  <circle cx="125" cy="100" r="5" fill="#8B5CF6" filter="url(#nodeGlow)"/>
  <circle cx="125" cy="150" r="5" fill="#14B8A6" filter="url(#nodeGlow)"/>
  
  <!-- Center nodes (H connection points) -->
  <circle cx="90" cy="95" r="6" fill="#FEF3C7" filter="url(#nodeGlow)"/>
  <circle cx="110" cy="95" r="6" fill="#FEF3C7" filter="url(#nodeGlow)"/>
  
  <!-- Central AI core -->
  <circle cx="100" cy="95" r="10" fill="url(#circuitGradient)" filter="url(#nodeGlow)" opacity="0.8"/>
  <circle cx="100" cy="95" r="5" fill="#FEF3C7" filter="url(#nodeGlow)"/>
  
  <!-- Outer circuit rings (subtle) -->
  <circle cx="100" cy="100" r="60" stroke="#1E293B" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="100" cy="100" r="75" stroke="#1E293B" stroke-width="1" fill="none" opacity="0.2"/>
  
  <!-- Data particles (small dots) -->
  <circle cx="60" cy="70" r="2" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="140" cy="70" r="2" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="60" cy="130" r="2" fill="#14B8A6" opacity="0.6"/>
  <circle cx="140" cy="130" r="2" fill="#14B8A6" opacity="0.6"/>
</svg>
