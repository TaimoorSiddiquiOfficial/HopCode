<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- HopCode Logo - Concept 2: Leaping H -->
  <!-- Represents: Forward motion, Progress, Energy -->
  
  <defs>
    <!-- Gradient for H (blue to cyan) -->
    <linearGradient id="hGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Motion blur gradient -->
    <linearGradient id="motionGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#F97316;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow effect -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0F0F14"/>
  
  <!-- Motion lines (speed effect) -->
  <line x1="40" y1="60" x2="70" y2="60" stroke="#F97316" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="35" y1="80" x2="65" y2="80" stroke="#F97316" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="30" y1="100" x2="60" y2="100" stroke="#F97316" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Main H with forward tilt (15 degrees) -->
  <g transform="skewX(-10)">
    <!-- Left vertical bar -->
    <rect x="70" y="60" width="18" height="80" rx="4" fill="url(#hGradient)" filter="url(#shadow)"/>
    
    <!-- Right vertical bar -->
    <rect x="112" y="60" width="18" height="80" rx="4" fill="url(#hGradient)" filter="url(#shadow)"/>
    
    <!-- Horizontal bar (ascending diagonal) -->
    <path d="M 70 90 L 130 85 L 130 105 L 70 110 Z" fill="url(#hGradient)" filter="url(#shadow)"/>
  </g>
  
  <!-- Leap arc (suggesting upward movement) -->
  <path d="M 50 140 Q 100 170 150 130" 
        stroke="#10B981" 
        stroke-width="6" 
        stroke-linecap="round"
        fill="none"
        opacity="0.6"/>
  
  <!-- Accent dot (energy) -->
  <circle cx="145" cy="70" r="8" fill="#F97316" filter="url(#shadow)"/>
  
  <!-- Gradient overlay for depth -->
  <ellipse cx="100" cy="100" rx="80" ry="70" fill="url(#motionGradient)" opacity="0.1"/>
</svg>
