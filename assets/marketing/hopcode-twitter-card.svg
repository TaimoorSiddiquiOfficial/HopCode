<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- HopCode Twitter Card (Twitter Summary Card) -->
  <!-- Size: 1200x600px (Twitter card optimized) -->
  
  <defs>
    <!-- Background gradient -->
    <linearGradient id="twitterBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E1E2E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Butterfly wing gradients -->
    <linearGradient id="twitterWingLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="twitterWingRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="twitterGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Background glow -->
    <radialGradient id="twitterBgGlow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#twitterBg)"/>
  
  <!-- Background glow -->
  <circle cx="600" cy="240" r="240" fill="url(#twitterBgGlow)"/>
  
  <!-- Large Butterfly Logo (center) -->
  <g transform="translate(500, 150)" filter="url(#twitterGlow)">
    <!-- Left Wing -->
    <path d="M 75 100 Q 55 70 60 50 Q 65 30 85 25 Q 95 23 100 30 L 100 100 Q 85 100 75 100 Z" fill="url(#twitterWingLeft)"/>
    <!-- Right Wing -->
    <path d="M 125 100 Q 145 70 140 50 Q 135 30 115 25 Q 105 23 100 30 L 100 100 Q 115 100 125 100 Z" fill="url(#twitterWingRight)"/>
    <!-- H Letterform -->
    <path d="M 88 115 L 88 165 L 96 165 L 96 140 L 104 140 L 104 165 L 112 165 L 112 115 L 104 115 L 104 132 L 96 132 L 96 115 Z" fill="#F59E0B"/>
    <!-- Code brackets -->
    <path d="M 70 85 L 62 100 L 70 115" stroke="#FEF3C7" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M 130 85 L 138 100 L 130 115" stroke="#FEF3C7" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Center dot -->
    <circle cx="100" cy="95" r="10" fill="#FEF3C7"/>
  </g>
  
  <!-- "HopCode" Text (below logo) -->
  <text x="600" y="420" 
        font-family="'Inter', system-ui, -apple-system, sans-serif" 
        font-size="72" 
        font-weight="700"
        letter-spacing="-2"
        fill="#FFFFFF"
        text-anchor="middle">
    Hop<tspan fill="#7C3AED">Code</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="600" y="470" 
        font-family="'Inter', system-ui, -apple-system, sans-serif" 
        font-size="24" 
        font-weight="400"
        letter-spacing="4"
        fill="#A1A1AA"
        text-anchor="middle">
    CODE WITH AI
  </text>
  
  <!-- Description box -->
  <rect x="350" y="500" width="500" height="60" fill="#1E1E2E" rx="12" opacity="0.8"/>
  
  <!-- Description text -->
  <text x="600" y="538" 
        font-family="'Inter', system-ui, -apple-system, sans-serif" 
        font-size="18" 
        fill="#E4E4E7"
        text-anchor="middle">
    AI-powered coding assistant · Open Source
  </text>
  
  <!-- Decorative particles -->
  <circle cx="150" cy="150" r="4" fill="#7C3AED" opacity="0.7"/>
  <circle cx="1050" cy="180" r="4" fill="#06B6D4" opacity="0.7"/>
  <circle cx="200" cy="450" r="4" fill="#F59E0B" opacity="0.7"/>
  <circle cx="1000" cy="420" r="4" fill="#7C3AED" opacity="0.7"/>
</svg>
