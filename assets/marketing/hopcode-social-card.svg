<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- HopCode Social Media Card (Open Graph / Twitter Card) -->
  <!-- Size: 1200x630px (Standard social sharing size) -->
  
  <defs>
    <!-- Background gradient -->
    <linearGradient id="socialBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E1E2E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Butterfly wing gradients -->
    <linearGradient id="socialWingLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="socialWingRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="socialGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Background glow circles -->
    <radialGradient id="bgGlow1" cx="50%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="bgGlow2" cx="80%" cy="70%" r="30%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#socialBg)"/>
  
  <!-- Background glow effects -->
  <circle cx="600" cy="189" r="252" fill="url(#bgGlow1)"/>
  <circle cx="960" cy="441" r="189" fill="url(#bgGlow2)"/>
  
  <!-- Decorative code brackets (background) -->
  <path d="M 80 200 L 50 315 L 80 430" stroke="#3F3F46" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.2"/>
  <path d="M 1120 200 L 1150 315 L 1120 430" stroke="#3F3F46" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.2"/>
  
  <!-- Large Butterfly Logo (center-left) -->
  <g transform="translate(280, 165)" filter="url(#socialGlow)">
    <!-- Left Wing -->
    <path d="M 75 100 Q 55 70 60 50 Q 65 30 85 25 Q 95 23 100 30 L 100 100 Q 85 100 75 100 Z" fill="url(#socialWingLeft)"/>
    <!-- Right Wing -->
    <path d="M 125 100 Q 145 70 140 50 Q 135 30 115 25 Q 105 23 100 30 L 100 100 Q 115 100 125 100 Z" fill="url(#socialWingRight)"/>
    <!-- H Letterform -->
    <path d="M 88 115 L 88 165 L 96 165 L 96 140 L 104 140 L 104 165 L 112 165 L 112 115 L 104 115 L 104 132 L 96 132 L 96 115 Z" fill="#F59E0B"/>
    <!-- Code brackets -->
    <path d="M 70 85 L 62 100 L 70 115" stroke="#FEF3C7" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 130 85 L 138 100 L 130 115" stroke="#FEF3C7" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Center dot -->
    <circle cx="100" cy="95" r="8" fill="#FEF3C7"/>
  </g>
  
  <!-- "HopCode" Text (right side) -->
  <text x="680" y="280" 
        font-family="'Inter', system-ui, -apple-system, sans-serif" 
        font-size="88" 
        font-weight="700"
        letter-spacing="-2"
        fill="url(#socialWingRight)">
    HopCode
  </text>
  
  <!-- Tagline -->
  <text x="682" y="340" 
        font-family="'Inter', system-ui, -apple-system, sans-serif" 
        font-size="32" 
        font-weight="400"
        letter-spacing="4"
        fill="#A1A1AA">
    CODE WITH AI
  </text>
  
  <!-- Description box -->
  <rect x="680" y="380" width="480" height="140" fill="#1E1E2E" rx="12" opacity="0.6"/>
  
  <!-- Description text -->
  <text x="700" y="420" 
        font-family="'Inter', system-ui, -apple-system, sans-serif" 
        font-size="20" 
        font-weight="400"
        fill="#E4E4E7">
    AI-powered coding assistant
  </text>
  
  <text x="700" y="455" 
        font-family="'Inter', system-ui, -apple-system, sans-serif" 
        font-size="18" 
        fill="#A1A1AA">
    Transform your workflow with the
  </text>
  
  <text x="700" y="485" 
        font-family="'Inter', system-ui, -apple-system, sans-serif" 
        font-size="18" 
        fill="#A1A1AA">
    butterfly effect of intelligent code.
  </text>
  
  <!-- Bottom accent line -->
  <line x1="100" y1="580" x2="1100" y2="580" stroke="#3F3F46" stroke-width="2" opacity="0.5"/>
  
  <!-- Website URL -->
  <text x="600" y="610" 
        font-family="'JetBrains Mono', monospace" 
        font-size="16" 
        fill="#71717A"
        text-anchor="middle">
    github.com/TaimoorSiddiquiOfficial/HopCode
  </text>
  
  <!-- Decorative particles -->
  <circle cx="200" cy="100" r="3" fill="#7C3AED" opacity="0.6"/>
  <circle cx="1000" cy="150" r="3" fill="#06B6D4" opacity="0.6"/>
  <circle cx="150" cy="500" r="3" fill="#F59E0B" opacity="0.6"/>
  <circle cx="1050" cy="480" r="3" fill="#7C3AED" opacity="0.6"/>
</svg>
