<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <!-- HopCode - Typed Logo Version 4: Minimalist Thin -->
  <!-- Elegant, thin typography for sophisticated use -->
  
  <defs>
    <!-- Subtle gradient -->
    <linearGradient id="thinGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E4E4E7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A1A1AA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="#1E1E2E"/>
  
  <!-- Main Text - Light weight -->
  <text x="400" y="100" 
        font-family="'Inter', 'Helvetica Neue', sans-serif" 
        font-size="64" 
        font-weight="200"
        letter-spacing="8"
        fill="url(#thinGradient)"
        text-anchor="middle">
    HOPCODE
  </text>
  
  <!-- Minimal divider -->
  <line x1="380" y1="120" x2="420" y2="120" 
        stroke="#7C3AED" 
        stroke-width="2" 
        opacity="0.8"/>
  
  <!-- Tagline -->
  <text x="400" y="150" 
        font-family="'Inter', sans-serif" 
        font-size="12" 
        font-weight="300"
        letter-spacing="3"
        fill="#71717A"
        text-anchor="middle">
    INTELLIGENT CODING ASSISTANT
  </text>
</svg>
