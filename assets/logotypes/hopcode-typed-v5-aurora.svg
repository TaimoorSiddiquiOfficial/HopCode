<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <!-- HopCode - Typed Logo Version 5: Gradient Aurora -->
  <!-- Vibrant multi-color gradient for dynamic appearance -->
  
  <defs>
    <!-- Aurora gradient -->
    <linearGradient id="auroraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="auroraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Background glow -->
    <radialGradient id="bgAurora" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="250" fill="#0F0F14"/>
  
  <!-- Background aurora effect -->
  <ellipse cx="400" cy="125" rx="300" ry="100" fill="url(#bgAurora)"/>
  
  <!-- Main Text with Aurora Gradient -->
  <text x="400" y="130" 
        font-family="'Inter', system-ui, sans-serif" 
        font-size="72" 
        font-weight="800"
        letter-spacing="-2"
        fill="url(#auroraGradient)"
        filter="url(#auroraGlow)"
        text-anchor="middle">
    HOPCODE
  </text>
  
  <!-- Tagline with gradient accent -->
  <text x="400" y="180" 
        font-family="'Inter', sans-serif" 
        font-size="16" 
        font-weight="500"
        letter-spacing="4"
        text-anchor="middle">
    <tspan fill="#A1A1AA">CODE WITH </tspan><tspan fill="url(#auroraGradient)">ARTIFICIAL INTELLIGENCE</tspan>
  </text>
  
  <!-- Decorative gradient line -->
  <line x1="250" y1="150" x2="550" y2="150" 
        stroke="url(#auroraGradient)" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.6"/>
</svg>
