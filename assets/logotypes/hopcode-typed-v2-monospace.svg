<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <!-- HopCode - Typed Logo Version 2: Monospace Terminal -->
  <!-- Code editor style typography -->
  
  <defs>
    <!-- Code green gradient -->
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
    </linearGradient>
    
    <!-- Cursor blink animation -->
    <animate id="cursorBlink" attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </defs>
  
  <!-- Background - Terminal style -->
  <rect width="800" height="200" fill="#1E1E2E"/>
  
  <!-- Terminal prompt -->
  <text x="50" y="80" 
        font-family="'JetBrains Mono', 'Fira Code', monospace" 
        font-size="24" 
        fill="#71717A">
    &gt;_
  </text>
  
  <!-- Main Text - Monospace -->
  <text x="130" y="80" 
        font-family="'JetBrains Mono', 'Fira Code', monospace" 
        font-size="48" 
        font-weight="700"
        fill="url(#codeGradient)">
    HOPCODE
  </text>
  
  <!-- Blinking cursor -->
  <rect x="485" y="55" width="12" height="36" fill="#10B981" opacity="0.8">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Secondary line - Tagline -->
  <text x="50" y="130" 
        font-family="'JetBrains Mono', monospace" 
        font-size="18" 
        fill="#A1A1AA">
    // Code with AI
  </text>
  
  <!-- Code brackets decoration -->
  <text x="720" y="130" 
        font-family="'JetBrains Mono', monospace" 
        font-size="24" 
        fill="#3F3F46">
    {'{ }'}
  </text>
</svg>
